<svg xmlns="http://www.w3.org/2000/svg" width="300" height="450" viewBox="0 0 300 450">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <pattern id="crosshatch" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 0,10 l 10,-10 M -2.5,2.5 l 5,-5 M 7.5,12.5 l 5,-5" 
            stroke="#333" stroke-width="0.5"/>
    </pattern>
  </defs>
  
  <!-- Card background -->
  <rect width="300" height="450" rx="15" fill="url(#cardGrad)"/>
  
  <!-- Border -->
  <rect x="5" y="5" width="290" height="440" rx="12" 
        fill="none" stroke="#444" stroke-width="2"/>
  
  <!-- Inner pattern area -->
  <rect x="15" y="60" width="270" height="330" rx="8" 
        fill="url(#crosshatch)" opacity="0.3"/>
  
  <!-- Center icon - stylized card symbol -->
  <g transform="translate(150, 225)">
    <circle r="50" fill="none" stroke="#555" stroke-width="2"/>
    <path d="M 0,-30 L 20,10 L 0,30 L -20,10 Z" 
          fill="none" stroke="#666" stroke-width="2"/>
    <circle r="8" fill="#555"/>
  </g>
  
  <!-- "IMK" text -->
  <text x="150" y="35" font-family="Arial, sans-serif" font-size="18" 
        fill="#555" text-anchor="middle" font-weight="bold">
    I MUST KILL
  </text>
  
  <!-- "Card Art" placeholder text -->
  <text x="150" y="420" font-family="Arial, sans-serif" font-size="12" 
        fill="#444" text-anchor="middle">
    Card Artwork
  </text>
</svg>
